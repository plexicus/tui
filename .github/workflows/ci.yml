name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - name: Smoke-test compiled binary
        run: |
          bun build src/main.tsx --compile --target=bun-linux-x64 --outfile dist/plexicus
          ./dist/plexicus --version
